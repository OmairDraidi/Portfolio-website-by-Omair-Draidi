services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: portfolio-app-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/portfolio
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-network
    volumes:
      - ./client:/app/client
      - ./server:/app/server
      - ./shared:/app/shared
      - ./script:/app/script
      - ./attached_assets:/app/attached_assets
      - node_modules:/app/node_modules
    stdin_open: true
    tty: true

volumes:
  postgres-data-dev:
  node_modules:

networks:
  portfolio-network:
    driver: bridge
